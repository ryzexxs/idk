<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: manipulation;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: #333 #111;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
            margin: 12px 0;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 3px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 14px;
            background: #fff;
            cursor: pointer;
            margin-top: -10px;
            border-radius: 3px;
            border: none;
        }
        input[type=range]::-moz-range-track {
            width: 100%;
            height: 3px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }
        input[type=range]::-moz-range-thumb {
            height: 20px;
            width: 14px;
            background: #fff;
            cursor: pointer;
            border-radius: 3px;
            border: none;
        }

        .bento-card {
            background-color: #0a0a0a;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 14px;
            transition: border-color 0.2s ease;
        }
        .bento-card:hover {
            border-color: #444;
        }

        .btn-action {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.error { border-color: #ef4444; color: #fca5a5; }
        .toast.success { border-color: #22c55e; color: #86efac; }
        .toast.warning { border-color: #f59e0b; color: #fcd34d; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;

        .preset-item {
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .preset-item:hover { border-color: #444; }

        .progress-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            flex-direction: column;
        }
        .progress-overlay.active { display: flex; }
        .progress-bar-bg {
            width: 300px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 16px;
        }
        .progress-bar-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.2s;
        }

        .effect-card.active {
            border-color: #fff;
            background: #111;
        }

        @media (max-width: 768px) {
            .bento-card { padding: 12px; }
            input[type=range] { margin: 10px 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <script>
        let audioCtx;
        let audioBuffer = null;
        let sourceNode;
        let isPlaying = false;

        let undoStack = [];
        let redoStack = [];
        const MAX_UNDO = 30;

        let distNode, bassNode, trebleNode, midsNode, verbNode, delayNode;
        let chorusNode, flangerNode, phaserNode, compNode;
        let panNode, dryNode, wetNode, delayDryNode, delayWetNode;
        let masterNode;

        let startTime = 0;
        let pauseOffset = 0;
        let updateInterval;
        let autoSaveTimer;

        const fileInput = document.getElementById('fileInput');
        const playBtn = document.getElementById('playBtn');
        const exportBtn = document.getElementById('exportBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');

        const uiUpload = document.getElementById('uploadUi');
        const uiLoading = document.getElementById('loadingUi');
        const uiInfo = document.getElementById('fileInfoUi');
        const txtFileName = document.getElementById('fileNameText');

        function triggerUpload() {
            fileInput.click();
        }

        fileInput.addEventListener('change', handleFileSelect);

        document.addEventListener('dragover', (e) => { e.preventDefault(); });
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('audio/')) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect({ target: { files: e.dataTransfer.files } });
            }
        });

        async function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            return audioCtx;
        }

        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            stopAudio();
            undoStack = [];
            redoStack = [];
            updateUndoRedoButtons();

            uiUpload.classList.add('hidden');
            uiInfo.classList.add('hidden');
            uiLoading.classList.remove('hidden');
            playBtn.disabled = true;
            exportBtn.disabled = true;

            try {
                await initAudioContext();
                const reader = new FileReader();

                reader.onload = async function(ev) {
                    try {
                        const audioData = ev.target.result;
                        showProgress(true, 'Decoding audio...', 50);

                        audioBuffer = await audioCtx.decodeAudioData(audioData);

                        showProgress(true, 'Complete', 100);
                        setTimeout(() => showProgress(false), 200);

                        saveToUndoStack();

                        uiLoading.classList.add('hidden');
                        uiInfo.classList.remove('hidden');
                        txtFileName.textContent = file.name.toUpperCase();

                        totalTimeEl.innerText = formatTime(audioBuffer.duration);
                        pauseOffset = 0;
                        progressBar.value = 0;
                        progressBar.disabled = false;

                        playBtn.disabled = false;
                        exportBtn.disabled = false;
                        document.getElementById('presetsBtn').disabled = false;
                        document.getElementById('trimBtn').disabled = false;
                        document.getElementById('fadeInBtn').disabled = false;
                        document.getElementById('fadeOutBtn').disabled = false;
                        document.getElementById('normalizeBtn').disabled = false;

                        setupNodes();
                        applyEffects();
                        autoSaveState();

                        showToast('Audio loaded', 'success');
                    } catch (err) {
                        console.error('Decode error:', err);
                        showToast('Error decoding audio', 'error');
                        resetUi();
                    }
                };

                reader.onerror = function() {
                    showToast('Error reading file', 'error');
                    resetUi();
                };

                reader.readAsArrayBuffer(file);
            } catch (err) {
                console.error('Init error:', err);
                showToast('Failed to initialize', 'error');
                resetUi();
            }
        }

        function resetUi() {
            uiLoading.classList.add('hidden');
            uiUpload.classList.remove('hidden');
            showProgress(false);
        }

        function makeDistortionCurve(amount) {
            const k = typeof amount === 'number' ? amount : 50;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) {
                let x = i * 2 / n_samples - 1;
                curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        }

        function createReverbBuffer() {
            if (!audioCtx) return null;
            const len = audioCtx.sampleRate;
            const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
            for (let c = 0; c < 2; c++) {
                const data = buf.getChannelData(c);
                for (let i = 0; i < len; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
                }
            }
            return buf;
        }

        function setupNodes() {
            distNode = audioCtx.createWaveShaper();
            distNode.oversample = 'none';

            bassNode = audioCtx.createBiquadFilter();
            bassNode.type = 'lowshelf';
            bassNode.frequency.value = 200;

            midsNode = audioCtx.createBiquadFilter();
            midsNode.type = 'peaking';
            midsNode.frequency.value = 1000;
            midsNode.Q.value = 0.5;

            trebleNode = audioCtx.createBiquadFilter();
            trebleNode.type = 'highshelf';
            trebleNode.frequency.value = 3000;

            compNode = audioCtx.createDynamicsCompressor();

            verbNode = audioCtx.createConvolver();
            verbNode.buffer = createReverbBuffer();

            delayNode = audioCtx.createDelay(0.5);
            delayNode.delayTime.value = 0;
            delayDryNode = audioCtx.createGain();
            delayWetNode = audioCtx.createGain();

            chorusNode = audioCtx.createGain();
            flangerNode = audioCtx.createGain();
            phaserNode = audioCtx.createBiquadFilter();
            phaserNode.type = 'allpass';
            phaserNode.frequency.value = 500;

            panNode = audioCtx.createStereoPanner();
            dryNode = audioCtx.createGain();
            wetNode = audioCtx.createGain();
            masterNode = audioCtx.createGain();

            distNode.connect(bassNode);
            bassNode.connect(midsNode);
            midsNode.connect(trebleNode);
            trebleNode.connect(compNode);

            compNode.connect(delayDryNode);
            compNode.connect(delayNode);
            delayNode.connect(delayWetNode);
            delayDryNode.gain.value = 1;
            delayWetNode.gain.value = 0;

            delayDryNode.connect(chorusNode);
            chorusNode.connect(flangerNode);
            flangerNode.connect(phaserNode);
            phaserNode.connect(dryNode);

            dryNode.connect(verbNode);
            verbNode.connect(wetNode);
            dryNode.connect(panNode);
            wetNode.connect(panNode);

            panNode.connect(masterNode);
            masterNode.connect(audioCtx.destination);
        }

        const sliders = {};
        const labels = {};

        ['dist', 'bass', 'treble', 'mids', 'verb', 'delay', 'chorus', 'comp',
         'flange', 'phase', 'speed', 'pitch', 'pan', 'vol', 'fadein', 'fadeout'].forEach(key => {
            sliders[key] = document.getElementById(`sl-${key}`);
            labels[key] = document.getElementById(`val-${key}`);
        });

        function applyEffects() {
            if (!masterNode || !audioCtx) return;

            const vDist = parseFloat(sliders.dist.value);
            const vBass = parseFloat(sliders.bass.value);
            const vTreble = parseFloat(sliders.treble.value);
            const vMids = parseFloat(sliders.mids.value);
            const vVerb = parseFloat(sliders.verb.value);
            const vDelay = parseFloat(sliders.delay.value);
            const vChorus = parseFloat(sliders.chorus.value);
            const vComp = parseFloat(sliders.comp.value);
            const vFlange = parseFloat(sliders.flange.value);
            const vPhase = parseFloat(sliders.phase.value);
            const vSpeed = parseFloat(sliders.speed.value);
            const vPitch = parseFloat(sliders.pitch.value);
            const vPan = parseFloat(sliders.pan.value);
            const vVol = parseFloat(sliders.vol.value);

            labels.dist.innerText = vDist + "%";
            labels.bass.innerText = vBass + "dB";
            labels.treble.innerText = vTreble + "dB";
            labels.mids.innerText = vMids + "dB";
            labels.verb.innerText = Math.round(vVerb * 100) + "%";
            labels.delay.innerText = Math.round(vDelay) + "ms";
            labels.chorus.innerText = vChorus + "%";
            labels.comp.innerText = vComp + "dB";
            labels.flange.innerText = vFlange + "%";
            labels.phase.innerText = vPhase + "%";
            labels.speed.innerText = vSpeed.toFixed(2) + "x";
            labels.pitch.innerText = (vPitch > 0 ? '+' : '') + vPitch + "st";
            labels.pan.innerText = vPan === 0 ? 'C' : (vPan > 0 ? 'R' + vPan : 'L' + Math.abs(vPan));
            labels.vol.innerText = Math.round(vVol * 100) + "%";

            distNode.curve = makeDistortionCurve(vDist * 2);
            bassNode.gain.setTargetAtTime(vBass, audioCtx.currentTime, 0.1);
            trebleNode.gain.setTargetAtTime(vTreble, audioCtx.currentTime, 0.1);
            midsNode.gain.setTargetAtTime(vMids, audioCtx.currentTime, 0.1);

            compNode.ratio.setTargetAtTime(1 + vComp / 10, audioCtx.currentTime, 0.1);
            compNode.threshold.setTargetAtTime(-50 + vComp, audioCtx.currentTime, 0.1);

            dryNode.gain.setTargetAtTime(1 - vVerb * 0.5, audioCtx.currentTime, 0.1);
            wetNode.gain.setTargetAtTime(vVerb, audioCtx.currentTime, 0.1);

            delayNode.delayTime.setTargetAtTime(vDelay / 1000, audioCtx.currentTime, 0.1);
            delayWetNode.gain.setTargetAtTime(vDelay > 0 ? 0.2 : 0, audioCtx.currentTime, 0.1);
            delayDryNode.gain.setTargetAtTime(vDelay > 0 ? 0.8 : 1, audioCtx.currentTime, 0.1);

            chorusNode.gain.setTargetAtTime(1 - vChorus / 100, audioCtx.currentTime, 0.1);
            flangerNode.gain.setTargetAtTime(1 - vFlange / 100, audioCtx.currentTime, 0.1);
            phaserNode.Q.setTargetAtTime(1 + vPhase / 10, audioCtx.currentTime, 0.1);

            panNode.pan.setTargetAtTime(vPan / 100, audioCtx.currentTime, 0.1);
            masterNode.gain.setTargetAtTime(vVol, audioCtx.currentTime, 0.1);

            if (sourceNode) {
                sourceNode.playbackRate.value = vSpeed;
                sourceNode.detune.value = vPitch * 100;
            }
        }

        Object.keys(sliders).forEach(k => {
            sliders[k].addEventListener('input', () => {
                applyEffects();
                clearTimeout(autoSaveTimer);
                autoSaveTimer = setTimeout(autoSaveState, 1000);
            });
        });

        function saveToUndoStack() {
            const state = getEffectState();
            undoStack.push(state);
            if (undoStack.length > MAX_UNDO) undoStack.shift();
            redoStack = [];
            updateUndoRedoButtons();
        }

        function getEffectState() {
            const state = {};
            Object.keys(sliders).forEach(key => {
                state[key] = sliders[key].value;
            });
            return state;
        }

        function restoreEffectState(state) {
            Object.keys(state).forEach(key => {
                if (sliders[key]) sliders[key].value = state[key];
            });
            applyEffects();
        }

        function undo() {
            if (undoStack.length <= 1) return;
            redoStack.push(undoStack.pop());
            restoreEffectState(undoStack[undoStack.length - 1]);
            updateUndoRedoButtons();
            autoSaveState();
            showToast('Undo', 'success');
        }

        function redo() {
            if (redoStack.length === 0) return;
            const state = redoStack.pop();
            undoStack.push(state);
            restoreEffectState(state);
            updateUndoRedoButtons();
            autoSaveState();
            showToast('Redo', 'success');
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = undoStack.length <= 1;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') {
                    e.preventDefault();
                    if (e.shiftKey) redo(); else undo();
                } else if (e.key === 'y') {
                    e.preventDefault();
                    redo();
                }
            }
            if (e.key === ' ') {
                e.preventDefault();
                if (!playBtn.disabled) togglePlay();
            }
        });

        function getPresets() {
            try { return JSON.parse(localStorage.getItem('audx_presets') || '[]'); }
            catch { return []; }
        }

        function savePresets(presets) {
            localStorage.setItem('audx_presets', JSON.stringify(presets));
        }

        function openPresetsModal() {
            const modal = document.getElementById('presetsModal');
            const list = document.getElementById('presetsList');
            const presets = getPresets();

            if (presets.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-sm text-center py-4">No presets saved</p>';
            } else {
                list.innerHTML = presets.map((p, i) => `
                    <div class="preset-item" onclick="loadPreset(${i})">
                        <span class="text-sm font-medium">${p.name}</span>
                        <button onclick="event.stopPropagation(); deletePreset(${i})" class="text-gray-500 hover:text-red-500">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `).join('');
            }
            modal.classList.add('active');
        }

        function closePresetsModal() {
            document.getElementById('presetsModal').classList.remove('active');
        }

        function saveNewPreset() {
            const name = prompt('Preset name:');
            if (!name) return;
            const presets = getPresets();
            presets.push({ name: name, state: getEffectState(), date: Date.now() });
            savePresets(presets);
            openPresetsModal();
            showToast('Preset saved', 'success');
        }

        function loadPreset(index) {
            const presets = getPresets();
            if (presets[index]) {
                saveToUndoStack();
                restoreEffectState(presets[index].state);
                closePresetsModal();
                showToast('Preset loaded', 'success');
            }
        }

        function deletePreset(index) {
            const presets = getPresets();
            const name = presets[index].name;
            presets.splice(index, 1);
            savePresets(presets);
            openPresetsModal();
            showToast('Preset deleted', 'success');
        }

        function openTrimModal() {
            if (!audioBuffer) return;
            document.getElementById('trimTotalDuration').textContent = formatTime(audioBuffer.duration);
            document.getElementById('trimStartInput').value = '0:00';
            document.getElementById('trimEndInput').value = formatTime(audioBuffer.duration);
            document.getElementById('trimModal').classList.add('active');
            document.getElementById('trimStartInput').focus();
        }

        function closeTrimModal() {
            document.getElementById('trimModal').classList.remove('active');
        }

        function parseTime(str) {
            str = str.trim();
            let parts = str.split(':').map(p => parseFloat(p));
            if (parts.length === 2) {
                return parts[0] * 60 + parts[1];
            } else if (parts.length === 1) {
                return parts[0];
            }
            return NaN;
        }

        function applyTrim() {
            if (!audioBuffer) return;

            const startStr = document.getElementById('trimStartInput').value;
            const endStr = document.getElementById('trimEndInput').value;

            const startTime = parseTime(startStr);
            const endTime = parseTime(endStr);

            if (isNaN(startTime) || isNaN(endTime)) {
                showToast('Invalid time format', 'error');
                return;
            }

            if (startTime < 0) {
                showToast('Start time cannot be negative', 'error');
                return;
            }

            if (endTime > audioBuffer.duration) {
                showToast('End time exceeds audio duration', 'error');
                return;
            }

            if (startTime >= endTime) {
                showToast('Start time must be before end time', 'error');
                return;
            }

            const startSample = Math.floor(startTime * audioBuffer.sampleRate);
            const endSample = Math.floor(endTime * audioBuffer.sampleRate);
            const newLength = endSample - startSample;

            if (newLength <= 0) {
                showToast('Invalid trim range', 'error');
                return;
            }

            const newBuffer = audioCtx.createBuffer(
                audioBuffer.numberOfChannels,
                newLength,
                audioBuffer.sampleRate
            );

            for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
                const oldData = audioBuffer.getChannelData(ch);
                const newData = newBuffer.getChannelData(ch);
                for (let i = 0; i < newLength; i++) {
                    newData[i] = oldData[startSample + i];
                }
            }

            audioBuffer = newBuffer;
            pauseOffset = 0;

            totalTimeEl.innerText = formatTime(audioBuffer.duration);
            progressBar.value = 0;
            currentTimeEl.innerText = '0:00';

            saveToUndoStack();
            closeTrimModal();
            showToast('Audio trimmed', 'success');
        }

        function applyFade(type) {
            if (!audioBuffer) return;
            const fadeDuration = type === 'in' ? parseFloat(sliders.fadein.value) : parseFloat(sliders.fadeout.value);
            if (fadeDuration <= 0) { showToast('Set fade > 0', 'warning'); return; }

            const sampleRate = audioBuffer.sampleRate;
            const fadeSamples = Math.floor(fadeDuration * sampleRate);

            for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
                const data = audioBuffer.getChannelData(ch);
                if (type === 'in') {
                    for (let i = 0; i < fadeSamples && i < data.length; i++) data[i] *= i / fadeSamples;
                } else {
                    const start = Math.max(0, data.length - fadeSamples);
                    for (let i = start; i < data.length; i++) data[i] *= (data.length - i) / fadeSamples;
                }
            }
            saveToUndoStack();
            showToast(type === 'in' ? 'Fade in applied' : 'Fade out applied', 'success');
        }

        function normalize() {
            if (!audioBuffer) return;
            let maxPeak = 0;
            for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
                const data = audioBuffer.getChannelData(ch);
                for (let i = 0; i < data.length; i++) maxPeak = Math.max(maxPeak, Math.abs(data[i]));
            }
            if (maxPeak === 0 || maxPeak >= 1) { showToast('Already normalized', 'warning'); return; }
            const gain = 0.99 / maxPeak;
            for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
                const data = audioBuffer.getChannelData(ch);
                for (let i = 0; i < data.length; i++) data[i] *= gain;
            }
            saveToUndoStack();
            showToast('Normalized', 'success');
        }

        playBtn.addEventListener('click', togglePlay);

        function togglePlay() {
            if (isPlaying) stopAudio(true); else startAudio();
        }

        function startAudio() {
            if (!audioBuffer) return;
            sourceNode = audioCtx.createBufferSource();
            sourceNode.buffer = audioBuffer;
            sourceNode.playbackRate.value = parseFloat(sliders.speed.value);
            sourceNode.detune.value = parseFloat(sliders.pitch.value) * 100;
            sourceNode.connect(distNode);
            const startOffset = Math.min(pauseOffset, audioBuffer.duration);
            sourceNode.start(0, startOffset);
            startTime = audioCtx.currentTime;
            isPlaying = true;
            playBtn.innerHTML = '<i class="fa-solid fa-pause mr-1"></i>Pause';
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(updateProgress, 250);
        }

        function stopAudio(savePos = false) {
            if (sourceNode) {
                try { sourceNode.stop(); } catch(e){}
                sourceNode.disconnect();
                sourceNode = null;
            }
            if (savePos && audioBuffer) {
                const speed = parseFloat(sliders.speed.value);
                const elapsed = (audioCtx.currentTime - startTime) * speed;
                pauseOffset += elapsed;
                if (pauseOffset >= audioBuffer.duration) pauseOffset = 0;
            } else if (!savePos) {
                pauseOffset = 0;
            }
            isPlaying = false;
            playBtn.innerHTML = '<i class="fa-solid fa-play mr-1"></i>Play';
            clearInterval(updateInterval);
        }

        function updateProgress() {
            if (!isPlaying || !audioBuffer) return;
            const speed = parseFloat(sliders.speed.value);
            const currentSec = pauseOffset + (audioCtx.currentTime - startTime) * speed;
            if (currentSec >= audioBuffer.duration) {
                stopAudio(false);
                progressBar.value = 0;
                currentTimeEl.innerText = "0:00";
                return;
            }
            progressBar.value = (currentSec / audioBuffer.duration) * 100;
            currentTimeEl.innerText = formatTime(currentSec);
        }

        progressBar.addEventListener('input', (e) => {
            if (!audioBuffer) return;
            pauseOffset = (e.target.value / 100) * audioBuffer.duration;
            currentTimeEl.innerText = formatTime(pauseOffset);
            if (isPlaying) {
                if (sourceNode) { try { sourceNode.stop(); } catch(e){} sourceNode.disconnect(); }
                startAudio();
            }
        });

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            if (sec < 10) sec = "0" + sec;
            return m + ":" + sec;
        }

        exportBtn.addEventListener('click', async () => {
            if (!audioBuffer) return;

            const btnText = exportBtn.innerText;
            exportBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Rendering...';
            exportBtn.disabled = true;
            playBtn.disabled = true;

            await new Promise(r => setTimeout(r, 50));

            try {
                const vSpeed = parseFloat(sliders.speed.value);
                const vDist = parseFloat(sliders.dist.value);
                const vBass = parseFloat(sliders.bass.value);
                const vTreble = parseFloat(sliders.treble.value);
                const vMids = parseFloat(sliders.mids.value);
                const vVerb = parseFloat(sliders.verb.value);
                const vDelay = parseFloat(sliders.delay.value);
                const vChorus = parseFloat(sliders.chorus.value);
                const vComp = parseFloat(sliders.comp.value);
                const vFlange = parseFloat(sliders.flange.value);
                const vPhase = parseFloat(sliders.phase.value);
                const vPitch = parseFloat(sliders.pitch.value);
                const vPan = parseFloat(sliders.pan.value);
                const vVol = parseFloat(sliders.vol.value);

                const totalDur = audioBuffer.duration / vSpeed;
                const sampleRate = 44100;
                const totalSamples = Math.floor(totalDur * sampleRate);

                showProgress(true, 'Rendering...', 0);

                const offlineCtx = new OfflineAudioContext(2, totalSamples, sampleRate);

                const oSource = offlineCtx.createBufferSource();
                oSource.buffer = audioBuffer;
                oSource.playbackRate.value = vSpeed;
                oSource.detune.value = vPitch * 100;

                const oDist = offlineCtx.createWaveShaper();
                oDist.curve = makeDistortionCurve(vDist * 2);
                oDist.oversample = 'none';

                const oBass = offlineCtx.createBiquadFilter();
                oBass.type = 'lowshelf';
                oBass.frequency.value = 200;
                oBass.gain.value = vBass;

                const oMids = offlineCtx.createBiquadFilter();
                oMids.type = 'peaking';
                oMids.frequency.value = 1000;
                oMids.Q.value = 0.5;
                oMids.gain.value = vMids;

                const oTreble = offlineCtx.createBiquadFilter();
                oTreble.type = 'highshelf';
                oTreble.frequency.value = 3000;
                oTreble.gain.value = vTreble;

                const oComp = offlineCtx.createDynamicsCompressor();
                oComp.threshold.value = -50 + vComp;
                oComp.ratio.value = 1 + vComp / 10;

                const oVerb = offlineCtx.createConvolver();
                const verbLen = sampleRate;
                const impBuf = offlineCtx.createBuffer(2, verbLen, sampleRate);
                for (let c = 0; c < 2; c++) {
                    const d = impBuf.getChannelData(c);
                    for (let i = 0; i < verbLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / verbLen, 2);
                }
                oVerb.buffer = impBuf;

                const oDry = offlineCtx.createGain();
                const oWet = offlineCtx.createGain();
                oDry.gain.value = 1 - vVerb * 0.5;
                oWet.gain.value = vVerb;

                const oDelay = offlineCtx.createDelay(0.5);
                oDelay.delayTime.value = vDelay / 1000;
                const oDelayDry = offlineCtx.createGain();
                const oDelayWet = offlineCtx.createGain();
                oDelayDry.gain.value = vDelay > 0 ? 0.8 : 1;
                oDelayWet.gain.value = vDelay > 0 ? 0.2 : 0;

                const oChorus = offlineCtx.createGain();
                const oFlanger = offlineCtx.createGain();
                const oPhaser = offlineCtx.createBiquadFilter();
                oPhaser.type = 'allpass';
                oPhaser.frequency.value = 500;
                oPhaser.Q.value = 1 + vPhase / 10;

                const oPan = offlineCtx.createStereoPanner();
                oPan.pan.value = vPan / 100;

                const oMaster = offlineCtx.createGain();
                oMaster.gain.value = vVol;

                oSource.connect(oDist);
                oDist.connect(oBass);
                oBass.connect(oMids);
                oMids.connect(oTreble);
                oTreble.connect(oComp);
                oComp.connect(oDelayDry);
                oComp.connect(oDelay);
                oDelay.connect(oDelayWet);
                oDelayDry.connect(oChorus);
                oDelayWet.connect(oChorus);
                oChorus.connect(oFlanger);
                oFlanger.connect(oPhaser);
                oPhaser.connect(oDry);
                oPhaser.connect(oVerb);
                oVerb.connect(oWet);
                oDry.connect(oPan);
                oWet.connect(oPan);
                oPan.connect(oMaster);
                oMaster.connect(offlineCtx.destination);

                oSource.start(0);

                showProgress(true, 'Rendering...', 30);

                const renderedBuf = await offlineCtx.startRendering();

                showProgress(true, 'Exporting...', 80);

                const wavBlob = bufferToWav(renderedBuf);
                const url = URL.createObjectURL(wavBlob);

                const link = document.createElement('a');
                link.href = url;
                link.download = "audx_export.wav";
                link.click();
                URL.revokeObjectURL(url);

                showProgress(true, 'Done!', 100);
                setTimeout(() => showProgress(false), 300);
                showToast('Export complete', 'success');

            } catch(e) {
                console.error(e);
                showProgress(false);
                showToast('Export failed: ' + e.message, 'error');
            }

            exportBtn.innerHTML = '<i class="fa-solid fa-download mr-1"></i>Download WAV';
            exportBtn.disabled = false;
            playBtn.disabled = false;
        });

        function bufferToWav(abuffer) {
            let numOfChan = abuffer.numberOfChannels;
            let length = abuffer.length * numOfChan * 2 + 44;
            let buffer = new ArrayBuffer(length);
            let view = new DataView(buffer);
            let channels = [], i, sample, offset = 0, pos = 0;

            function setUint16(data) { view.setUint16(offset, data, true); offset += 2; }
            function setUint32(data) { view.setUint32(offset, data, true); offset += 4; }

            setUint32(0x46464952);
            setUint32(length - 8);
            setUint32(0x45564157);
            setUint32(0x20746d66);
            setUint32(16);
            setUint16(1);
            setUint16(numOfChan);
            setUint32(abuffer.sampleRate);
            setUint32(abuffer.sampleRate * 2 * numOfChan);
            setUint16(numOfChan * 2);
            setUint16(16);
            setUint32(0x61746164);
            setUint32(length - pos - 4);

            for(i = 0; i < abuffer.numberOfChannels; i++)
                channels.push(abuffer.getChannelData(i));

            while(pos < abuffer.length) {
                for(i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][pos]));
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0;
                    view.setInt16(offset, sample, true);
                    offset += 2;
                }
                pos++;
            }

            return new Blob([buffer], { type: "audio/wav" });
        }

        function autoSaveState() {
            if (!audioBuffer) return;
            const state = { effects: getEffectState(), fileName: txtFileName.textContent, timestamp: Date.now() };
            try { localStorage.setItem('audx_state', JSON.stringify(state)); } catch (e) {}
        }

        function loadSavedState() {
            try {
                const saved = localStorage.getItem('audx_state');
                if (saved) {
                    const state = JSON.parse(saved);
                    if (Date.now() - state.timestamp < 24 * 60 * 60 * 1000) return state.effects;
                }
            } catch (e) {}
            return null;
        }

        window.addEventListener('load', () => {
            const savedState = loadSavedState();
            if (savedState) {
                restoreEffectState(savedState);
                showToast('Session restored', 'success');
            }
        });

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function showProgress(show, text = '', percent = 0) {
            const overlay = document.getElementById('progressOverlay');
            const fill = document.getElementById('progressFill');
            const percentText = document.getElementById('progressPercent');
            const progressText = document.getElementById('progressText');
            if (show) {
                overlay.classList.add('active');
                progressText.textContent = text;
                fill.style.width = percent + '%';
                percentText.textContent = Math.round(percent) + '%';
            } else {
                overlay.classList.remove('active');
            }
        }
    </script>
</body>
</html>
